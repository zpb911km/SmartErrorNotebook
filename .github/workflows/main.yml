name: 'publish'

on:
  workflow_dispatch:
  push:
    branches: [ "test-actions" ]

jobs:
  publish-tauri:
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: 'macos-latest' # for Arm based macs (M1 and above).
            args: '--target aarch64-apple-darwin'
          - platform: 'macos-latest' # for Intel based macs.
            args: '--target x86_64-apple-darwin'
          - platform: 'ubuntu-22.04'
            args: ''
          - platform: 'ubuntu-22.04-arm' # Only available in public repos.
            args: ''
          - platform: 'windows-latest'
            args: ''

    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4

      - name: install dependencies (ubuntu only)
        if: matrix.platform == 'ubuntu-22.04' || matrix.platform == 'ubuntu-22.04-arm'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf xdg-utils

      - name: setup node
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: setup pnpm
        uses: pnpm/action-setup@v2
        with:
          version: 8

      - name: install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.platform == 'macos-latest' && 'aarch64-apple-darwin,x86_64-apple-darwin' || '' }}

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: './src-tauri -> target'

      - name: install frontend dependencies
        run: pnpm install

      - uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: app-v__VERSION__
          releaseName: 'App v__VERSION__'
          releaseBody: 'See the assets to download this version and install.'
          releaseDraft: true
          prerelease: false
          args: ${{ matrix.args }}

  android-build:
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: 'aarch64'
            arch_name: arm64
            abi: arm64-v8a
          - target: 'armv7'
            arch_name: arm32
            abi: armeabi-v7a
          - target: 'x86_64'
            arch_name: x64
            abi: x86_64
          - target: 'i686'
            arch_name: x86
            abi: x86
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - name: install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf xdg-utils openjdk-17-jdk gradle

      - name: setup node
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: setup pnpm
        uses: pnpm/action-setup@v2
        with:
          version: 8

      - name: install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}-linux-android

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: './src-tauri -> target'

      - name: setup Java
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: setup Android SDK
        uses: android-actions/setup-android@v3

      - name: install frontend dependencies
        run: pnpm install

      - name: backup custom android config
        run: |
          mkdir -p /tmp/android-config/app/src/main
          cp src-tauri/gen/android/app/src/main/AndroidManifest.xml /tmp/android-config/
          cp src-tauri/gen/android/app/build.gradle.kts /tmp/android-config/

      - name: clean old android build
        run: rm -rf src-tauri/gen/android

      - name: prepare android
        run: pnpm tauri android init

      - name: restore custom android config
        run: |
          cp -f /tmp/android-config/AndroidManifest.xml src-tauri/gen/android/app/src/main/
          cp -f /tmp/android-config/build.gradle.kts src-tauri/gen/android/app/

      - name: fix android icon
        run: pnpm tauri icon

      - name: build APK
        run: pnpm tauri android build --target=${{ matrix.target }}

      - name: upload APK
        uses: actions/upload-artifact@v4
        with:
          name: app-android-${{ matrix.arch_name }}
          path: src-tauri/gen/android/app/build/outputs/apk/**/**/*.apk

      - name: release apk
        uses: softprops/action-gh-release@v1
        with:
          files: src-tauri/gen/android/app/build/outputs/apk/**/**/*.apk
          tag_name: app-v__VERSION__-android-${{ matrix.arch_name }}
          name: App v__VERSION__ Android ${{ matrix.arch_name }}
          body: Android APK for ${{ matrix.abi }} devices
          draft: true
          prerelease: false
