name: Build Tauri Application - Win/Linux/Android

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  release:
    types: [published]
  workflow_dispatch:  # 手动触发
    inputs:
      platform:
        description: '选择要构建的平台 (windows/linux/android/all)'
        required: false
        default: 'all'
        type: choice
        options:
          - windows
          - linux
          - android
          - all

jobs:
  build-windows:
    if: ${{ github.event.inputs.platform == 'all' || github.event.inputs.platform == 'windows' || github.event_name != 'workflow_dispatch' }}
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'

      - name: Install pnpm
        uses: pnpm/action-setup@v2
        with:
          version: 9

      - name: Install Rust
        uses: dtolnay/rust-action@stable
        with:
          targets: x86_64-pc-windows-msvc

      - name: Install Visual Studio Build Tools
        run: |
          if (!(Test-Path "C:\Program Files\Microsoft Visual Studio\2022")) {
            winget install Microsoft.VisualStudio.2022.BuildTools --silent --wait
          }
          echo "C:\Program Files\Microsoft Visual Studio\2022\BuildTools\VC\Auxiliary\Build" >> $GITHUB_PATH

      - name: Install WebView2 Runtime
        run: Start-BitsTransfer -Source https://go.microsoft.com/fwlink/p/?LinkId=2124703 -Destination $env:TMP\webview2install.exe; & $env:TMP\webview2install.exe /silent /install

      - name: Install dependencies
        run: pnpm install

      - name: Build for Windows (MSI)
        run: pnpm tauri build --target x86_64-pc-windows-msvc

      - name: Upload MSI package
        uses: actions/upload-artifact@v4
        with:
          name: smarterrornotebook-windows-msi
          path: src-tauri/target/x86_64-pc-windows-msvc/release/bundle/msi/*.msi
          retention-days: 30

      - name: Upload EXE bundle
        uses: actions/upload-artifact@v4
        with:
          name: smarterrornotebook-windows-exe
          path: src-tauri/target/x86_64-pc-windows-msvc/release/bundle/exe/*.exe
          retention-days: 30

  build-linux:
    if: ${{ github.event.inputs.platform == 'all' || github.event.inputs.platform == 'linux' || github.event_name != 'workflow_dispatch' }}
    runs-on: ubuntu-22.04

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'

      - name: Install pnpm
        uses: pnpm/action-setup@v2
        with:
          version: 9

      - name: Install Rust
        uses: dtolnay/rust-action@stable

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libgtk-3-dev \
            libwebkit2gtk-4.1-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            libsqlite3-dev \
            pkg-config \
            libssl-dev

      - name: Install dependencies
        run: pnpm install

      - name: Build for Linux
        run: pnpm tauri build

      - name: Upload deb package
        uses: actions/upload-artifact@v4
        with:
          name: smarterrornotebook-linux-deb
          path: src-tauri/target/release/bundle/deb/*.deb
          retention-days: 30

      - name: Upload AppImage
        uses: actions/upload-artifact@v4
        with:
          name: smarterrornotebook-linux-appimage
          path: src-tauri/target/release/bundle/appimage/*.AppImage
          retention-days: 30

      - name: Upload rpm package
        uses: actions/upload-artifact@v4
        with:
          name: smarterrornotebook-linux-rpm
          path: src-tauri/target/release/bundle/rpm/*.rpm
          retention-days: 30

  build-android:
    if: ${{ github.event.inputs.platform == 'all' || github.event.inputs.platform == 'android' || github.event_name != 'workflow_dispatch' }}
    runs-on: ubuntu-22.04

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'

      - name: Install pnpm
        uses: pnpm/action-setup@v2
        with:
          version: 9

      - name: Install Rust
        uses: dtolnay/rust-action@stable
        with:
          targets: aarch64-linux-android,armv7-linux-androideabi

      - name: Install Android NDK
        run: |
          mkdir -p $ANDROID_HOME/ndk
          cd $ANDROID_HOME/ndk
          curl -L https://dl.google.com/android/repository/android-ndk-r25b-linux.zip -o ndk.zip
          unzip ndk.zip --destination-dir=.
          rm ndk.zip

      - name: Configure environment
        run: |
          echo "ANDROID_NDK_HOME=$ANDROID_HOME/ndk/android-ndk-r25b" >> $GITHUB_ENV
          echo "PATH=${PATH}:/opt/android-ndk/toolchains/llvm/prebuilt/linux-x86_64/bin" >> $GITHUB_ENV

      - name: Install dependencies
        run: pnpm install

      - name: Build for Android
        run: pnpm tauri android build

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: smarterrornotebook-android
          path: src-tauri/android/app/build/outputs/apk/**/*.apk
          retention-days: 30
